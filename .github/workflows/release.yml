name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            editors/vscode/package-lock.json
            clients/web/package-lock.json
      - run: python -m pip install -e ".[dev,all]"
      - run: ruff check src tests scripts
      - run: pyright
      - name: Verify tag matches package version
        shell: bash
        run: python -c "import os,mycode; assert os.environ['GITHUB_REF_NAME'] == 'v' + mycode.__version__"
      - run: python -m pytest -q
      - run: mycode eval run --json
      - run: npm ci
        working-directory: editors/vscode
      - run: npm run check && npm test
        working-directory: editors/vscode
      - run: npm ci
        working-directory: clients/web
      - run: npm run check && npm test
        working-directory: clients/web

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            editors/vscode/package-lock.json
            clients/web/package-lock.json
      - run: python -m pip install build twine
      - run: npm ci && npm run build
        working-directory: clients/web
      - run: git diff --exit-code -- src/mycode/web/static
      - run: python -m build
      - run: python -m twine check dist/*
      - run: npm ci && npm run package -- --out ../../dist/mycode-${{ github.ref_name }}.vsix
        working-directory: editors/vscode
      - run: cd dist && sha256sum * > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - shell: bash
        run: rm -f dist/*.vsix dist/SHA256SUMS.txt
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          attestations: false
          skip-existing: true

  smoke-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ mycode-ai-cli==${GITHUB_REF_NAME#v}
          mycode --version

  publish-pypi:
    needs: smoke-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - shell: bash
        run: rm -f dist/*.vsix dist/SHA256SUMS.txt
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
