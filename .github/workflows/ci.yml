name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compatibility:
    name: Compatibility ${{ matrix.python }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.11" }
          - { os: ubuntu-latest, python: "3.12" }
          - { os: ubuntu-latest, python: "3.13" }
          - { os: ubuntu-latest, python: "3.14" }
          - { os: windows-latest, python: "3.11" }
          - { os: windows-latest, python: "3.14" }
          - { os: macos-latest, python: "3.11" }
          - { os: macos-latest, python: "3.14" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,all]"
      - name: Cross-platform smoke tests
        run: >-
          python -m pytest -q -o addopts=
          tests/test_permissions.py
          tests/test_session.py
          tests/test_models.py
          tests/test_runtime.py

  package-python:
    needs: [quality, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install build twine
      - run: git diff --exit-code -- src/mycode/web/static
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,all]"
      - run: ruff check src tests scripts
      - run: pyright
      - run: python -m pytest -q --cov=mycode --cov-report=term-missing --cov-fail-under=80
      - run: mycode eval run --json

  vscode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: xvfb-run -a npm run test:vscode
      - run: npm run package -- --out mycode.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-vsix
          path: editors/vscode/mycode.vsix

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - run: python -m pip install -e ".[web]"
      - run: npm ci
        working-directory: clients/web
      - run: npm run check
        working-directory: clients/web
      - run: npm test
        working-directory: clients/web
      - run: npm run build
        working-directory: clients/web
      - name: Verify bundled Web assets are current
        run: git diff --exit-code -- src/mycode/web/static
      - run: npx playwright install --with-deps chromium
        working-directory: clients/web
      - name: Playwright local workbench smoke test
        shell: bash
        run: |
          python -m tests.web_preview_server --port 8765 --token qa-token &
          server=$!
          trap 'kill $server' EXIT
          for attempt in {1..50}; do
            curl -fsS http://127.0.0.1:8765/healthz && break
            sleep 0.2
          done
          cd clients/web
          npm run qa:visual
      - uses: actions/upload-artifact@v4
        with:
          name: web-screenshots
          path: .pytmp/web-qa/*.png
